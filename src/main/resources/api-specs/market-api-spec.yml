openapi: 3.0.0
info:
  title: Marketplace API
  description: REST API for managing products, categories, orders, and carts
  version: 1.0.0

paths:
  # ==============================
  # 🛒 PRODUCTS
  # ==============================
  /api/v1/products:
    get:
      summary: Get all products (optionally filtered by category)
      description: Retrieve all products. If `categoryId` is provided, only products from that category are returned.
      tags: [ Products ]
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
          description: Optional category ID to filter products by.
      responses:
        '200':
          description: List of products (filtered if categoryId provided).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponseDto'
        '404':
          description: Category not found (if specified categoryId does not exist).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    post:
      summary: Create a new product
      description: Add a new product to the marketplace under an existing category.
      tags: [ Products ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDto'
      responses:
        '201':
          description: Product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDto'
        '400':
          description: Validation error — invalid product data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Category not found — provided categoryId does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/products/{id}:
    get:
      summary: Get product by ID
      tags: [ Products ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: Product ID to retrieve.
      responses:
        '200':
          description: Product found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDto'
        '404':
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    put:
      summary: Update product by ID
      tags: [ Products ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: Product ID to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDto'
      responses:
        '200':
          description: Product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDto'
        '400':
          description: Validation error — invalid data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Product or category not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete product by ID
      description: Deletes a product.
        This operation is **idempotent** — returns 204 even if the product does not exist.
      tags: [ Products ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Product deleted successfully (idempotent operation).

  # ==============================
  # 🏷️ CATEGORIES
  # ==============================
  /api/v1/categories:
    get:
      summary: Get all categories
      tags: [ Categories ]
      responses:
        '200':
          description: List of all categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponseDto'

    post:
      summary: Create a new category
      tags: [ Categories ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '201':
          description: Category created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '400':
          description: Invalid category data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'

  /api/v1/categories/{id}:
    get:
      summary: Get category by ID
      tags: [ Categories ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Category found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '404':
          description: Category not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    put:
      summary: Update category
      tags: [ Categories ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '200':
          description: Category updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Category not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete category
      tags: [ Categories ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Category deleted successfully (idempotent operation).

  # ==============================
  # 📦 ORDERS
  # ==============================
  /api/v1/orders:
    get:
      summary: Get all orders
      tags: [ Orders ]
      responses:
        '200':
          description: Successfully retrieved orders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponseDto'

    post:
      summary: Create a new order
      description: Place a new order based on an existing cart.
      tags: [ Orders ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequestDto'
      responses:
        '201':
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponseDto'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Cart not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/orders/{id}:
    get:
      summary: Get order by ID
      tags: [ Orders ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Order found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponseDto'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    patch:
      summary: Update order status
      description: Update the status of an existing order (e.g. from NEW to PAID or CANCELLED).
      tags: [ Orders ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the order to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdateRequestDto'
      responses:
        '200':
          description: Order status updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponseDto'
        '400':
          description: Invalid status transition or malformed request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete order
      tags: [ Orders ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Order deleted successfully (idempotent).
  /api/v1/orders/stats/top:
    get:
      summary: Get top selling products report
      description: >
        Returns a list of best-selling products based on order history.  
        Useful for generating analytical reports.
      tags: [ Orders ]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
          description: Maximum number of products to return (default is 5).
      responses:
        '200':
          description: Report generated successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductSalesStatsResponseDto'

  # ==============================
  # 🛍️ CARTS
  # ==============================
  /api/v1/carts:
    get:
      summary: Get all carts
      tags: [ Carts ]
      responses:
        '200':
          description: Successfully retrieved carts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartListResponseDto'

    post:
      summary: Create a new cart
      tags: [ Carts ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartRequestDto'
      responses:
        '201':
          description: Cart created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponseDto'
        '400':
          description: Invalid cart data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: One or more products not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/carts/{id}:
    get:
      summary: Get cart by ID
      tags: [ Carts ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Cart found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponseDto'
        '404':
          description: Cart not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    patch:
      summary: Modify cart contents
      description: Add or remove existing products from a cart.
      tags: [ Carts ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Cart ID to modify.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartUpdateRequestDto'
      responses:
        '200':
          description: Cart updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponseDto'
        '400':
          description: Invalid input data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Cart or product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete cart by ID
      tags: [ Carts ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Cart deleted successfully (idempotent).

    # ==============================
  # 🐱 COSMO CATS
  # ==============================
  /api/v1/cosmo-cats:
    get:
      summary: Get all Cosmo Cats
      description: >
        Returns a list of Cosmo Cat names.  
        This endpoint is controlled by the `cosmo-cats.enabled` feature toggle.
      tags: [ Cosmo Cats ]
      responses:
        '200':
          description: Successfully retrieved list of Cosmo Cats.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: [ "Luna", "Comet", "Nebula", "Orion" ]
        '503':
          description: Feature not available (when toggle is disabled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/cosmo-cats/{name}:
    get:
      summary: Get Cosmo Cat by name
      description: >
        Returns the name of a specific Cosmo Cat if it exists.  
        Controlled by the same feature toggle (`cosmo-cats.enabled`).
      tags: [ Cosmo Cats ]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Name of the Cosmo Cat.
      responses:
        '200':
          description: Successfully retrieved the Cosmo Cat name.
          content:
            application/json:
              schema:
                type: string
                example: "Luna"
        '404':
          description: Cosmo Cat not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '503':
          description: Feature not available (when toggle is disabled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'


components:
  schemas:
    # 🛒 PRODUCTS
    ProductRequestDto:
      type: object
      required: [ name, price, categoryId, available ]
      properties:
        name:
          type: string
          example: "Cosmo Hoodie"
        description:
          type: string
          example: "A comfy hoodie with galaxy print."
        price:
          type: number
          format: double
          minimum: 0.01
          example: 49.99
        categoryId:
          type: integer
          example: 2
        available:
          type: boolean
          example: true

    ProductResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Cosmo Hoodie"
        description:
          type: string
          example: "A comfy hoodie with galaxy print."
        price:
          type: number
          format: double
          example: 49.99
        category:
          $ref: '#/components/schemas/CategoryResponseDto'
        available:
          type: boolean
          example: true

    ProductListResponseDto:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponseDto'

    # 🏷️ CATEGORIES
    CategoryRequestDto:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          example: "Clothing"
        description:
          type: string
          example: "All wearable cosmic items."

    CategoryResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Clothing"
        description:
          type: string
          example: "All wearable cosmic items."

    CategoryListResponseDto:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponseDto'

    # 📦 ORDERS
    OrderRequestDto:
      type: object
      required: [ cartId ]
      properties:
        cartId:
          type: integer
          example: 12

    OrderResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 10
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponseDto'
        totalPrice:
          type: number
          format: double
          example: 149.97
        status:
          type: string
          example: "PAID"

    OrderListResponseDto:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponseDto'

    OrderStatusUpdateRequestDto:
      type: object
      required: [ status ]
      properties:
        status:
          type: string
          example: "PAID"
          description: >
            New status of the order.  
            Allowed values: NEW, PROCESSING, PAID, CANCELLED, COMPLETED.

    ProductSalesStatsResponseDto:
      type: object
      description: "Data transfer object for sales statistics report"
      properties:
        productName:
          type: string
          example: "Cosmic Tuna"
          description: "Name of the product"
        salesCount:
          type: integer
          format: int64
          example: 42
          description: "Total number of times this product has been ordered"

    # 🛍️ CARTS
    CartRequestDto:
      type: object
      required: [ productIds ]
      properties:
        productIds:
          type: array
          items:
            type: integer
          example: [ 1, 3, 7 ]
          description: List of product IDs to add to the new cart.

    CartResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 5
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponseDto'
        totalPrice:
          type: number
          format: double
          example: 99.99

    CartListResponseDto:
      type: object
      properties:
        carts:
          type: array
          items:
            $ref: '#/components/schemas/CartResponseDto'

    CartUpdateRequestDto:
      type: object
      properties:
        addProductIds:
          type: array
          items:
            type: integer
          example: [ 2, 3 ]
          description: List of product IDs to add to the cart.
        removeProductIds:
          type: array
          items:
            type: integer
          example: [ 1 ]
          description: List of product IDs to remove from the cart.

    # ⚠️ ERRORS
    ErrorResponseDto:
      type: object
      properties:
        type:
          type: string
          example: "feature-unavailable"
          description: "Machine-readable error type"
        title:
          type: string
          example: "Feature Unavailable"
          description: "Short human-readable summary of the error"
        status:
          type: integer
          example: 503
          description: "HTTP status code"
        detail:
          type: string
          example: "Feature 'cosmo-cats.enabled' is not available right now."
          description: "Detailed human-readable explanation"
        instance:
          type: string
          example: "/api/v1/cosmo-cats"
          description: "Request path where the error occurred"

    ValidationErrorDto:
      type: object
      properties:
        type:
          type: string
          example: "validation-error"
          description: "Machine-readable identifier of the validation error"
        title:
          type: string
          example: "Validation Failed"
          description: "Human-readable summary of the validation failure"
        status:
          type: integer
          example: 400
          description: "HTTP status code"
        instance:
          type: string
          example: "/api/v1/products"
          description: "The request path where the error occurred"
        errors:
          type: array
          description: "List of validation field errors"
          items:
            $ref: '#/components/schemas/ValidationFieldError'

    ValidationFieldError:
      type: object
      properties:
        field:
          type: string
          example: "price"
          description: "The field that failed validation"
        reason:
          type: string
          example: "must be greater than or equal to 0.01"
          description: "Human-readable explanation of the validation issue"
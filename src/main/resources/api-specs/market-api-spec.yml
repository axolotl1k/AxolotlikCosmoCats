openapi: 3.0.0
info:
  title: Marketplace API
  description: REST API for managing products, categories, orders, and carts
  version: 1.0.0

paths:
  # ==============================
  # 🛒 PRODUCTS
  # ==============================
  /api/v1/products:
    get:
      summary: Get all products (optionally filtered by category)
      description: Retrieve all products. If `categoryId` is provided, only products from that category are returned.
      tags: [Products]
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
          description: Optional category ID to filter products by.
      responses:
        '200':
          description: List of products (filtered if categoryId provided).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponseDto'
        '404':
          description: Category not found (if specified categoryId does not exist).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    post:
      summary: Create a new product
      description: Add a new product to the marketplace under an existing category.
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDto'
      responses:
        '201':
          description: Product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDto'
        '400':
          description: Validation error — invalid product data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Category not found — provided categoryId does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/products/{id}:
    get:
      summary: Get product by ID
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: Product ID to retrieve.
      responses:
        '200':
          description: Product found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDto'
        '404':
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    put:
      summary: Update product by ID
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: Product ID to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDto'
      responses:
        '200':
          description: Product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDto'
        '400':
          description: Validation error — invalid data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Product or category not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete product by ID
      description: Deletes a product.
        This operation is **idempotent** — returns 204 even if the product does not exist.
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Product deleted successfully (idempotent operation).

  # ==============================
  # 🏷️ CATEGORIES
  # ==============================
  /api/v1/categories:
    get:
      summary: Get all categories
      tags: [Categories]
      responses:
        '200':
          description: List of all categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponseDto'

    post:
      summary: Create a new category
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '201':
          description: Category created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '400':
          description: Invalid category data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'

  /api/v1/categories/{id}:
    get:
      summary: Get category by ID
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Category found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '404':
          description: Category not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    put:
      summary: Update category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '200':
          description: Category updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Category not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete category
      tags: [Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Category deleted successfully (idempotent operation).

  # ==============================
  # 📦 ORDERS
  # ==============================
  /api/v1/orders:
    get:
      summary: Get all orders
      tags: [Orders]
      responses:
        '200':
          description: Successfully retrieved orders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponseDto'

    post:
      summary: Create a new order
      description: Place a new order with a list of products.
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequestDto'
      responses:
        '201':
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponseDto'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: One or more products not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /api/v1/orders/{id}:
    get:
      summary: Get order by ID
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Order found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponseDto'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    patch:
      summary: Update order status
      description: Update the status of an existing order (e.g. from NEW to PAID or CANCELLED).
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the order to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdateRequestDto'
      responses:
        '200':
          description: Order status updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponseDto'
        '400':
          description: Invalid status transition or malformed request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete order
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Order deleted successfully (idempotent).

  # ==============================
  # 🛍️ CARTS
  # ==============================
  /api/v1/carts:
    get:
      summary: Get all carts
      tags: [Carts]
      responses:
        '200':
          description: Successfully retrieved carts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartListResponseDto'

    post:
      summary: Create a new cart
      tags: [Carts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartRequestDto'
      responses:
        '201':
          description: Cart created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponseDto'
        '400':
          description: Invalid cart data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'

  /api/v1/carts/{id}:
    get:
      summary: Get cart by ID
      tags: [Carts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Cart found successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponseDto'
        '404':
          description: Cart not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    patch:
      summary: Modify cart contents
      description: Add or remove existing products from a cart.
      tags: [Carts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Cart ID to modify.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartUpdateRequestDto'
      responses:
        '200':
          description: Cart updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponseDto'
        '400':
          description: Invalid input data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorDto'
        '404':
          description: Cart or product not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

    delete:
      summary: Delete cart by ID
      tags: [Carts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Cart deleted successfully (idempotent).

components:
  schemas:
    # 🛒 PRODUCTS
    ProductRequestDto:
      type: object
      required: [name, price, categoryId]
      properties:
        name:
          type: string
          example: "Cosmo Hoodie"
        description:
          type: string
          example: "A comfy hoodie with galaxy print."
        price:
          type: number
          format: double
          minimum: 0.01
          example: 49.99
        categoryId:
          type: integer
          example: 2
        available:
          type: boolean
          example: true

    ProductResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Cosmo Hoodie"
        description:
          type: string
          example: "A comfy hoodie with galaxy print."
        price:
          type: number
          format: double
          example: 49.99
        category:
          $ref: '#/components/schemas/CategoryResponseDto'
        available:
          type: boolean
          example: true

    ProductListResponseDto:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponseDto'

    # 🏷️ CATEGORIES
    CategoryRequestDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Clothing"
        description:
          type: string
          example: "All wearable cosmic items."

    CategoryResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Clothing"
        description:
          type: string
          example: "All wearable cosmic items."

    CategoryListResponseDto:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponseDto'

    # 📦 ORDERS
    OrderRequestDto:
      type: object
      required: [productIds]
      properties:
        productIds:
          type: array
          items:
            type: integer
          example: [1, 2, 3]
          description: IDs of products included in the order.

    OrderResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 10
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponseDto'
        totalPrice:
          type: number
          format: double
          example: 149.97
        status:
          type: string
          example: "PAID"

    OrderListResponseDto:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponseDto'

    OrderStatusUpdateRequestDto:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "PAID"
          description: >
            New status of the order.  
            Allowed values: NEW, PROCESSING, PAID, CANCELLED, COMPLETED.


    # 🛍️ CARTS
    CartRequestDto:
      type: object
      properties:
        productIds:
          type: array
          items:
            type: integer
          example: [1, 3, 7]
          description: List of product IDs to add to the new cart.

    CartResponseDto:
      type: object
      properties:
        id:
          type: integer
          example: 5
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponseDto'
        totalPrice:
          type: number
          format: double
          example: 99.99

    CartListResponseDto:
      type: object
      properties:
        carts:
          type: array
          items:
            $ref: '#/components/schemas/CartResponseDto'

    CartUpdateRequestDto:
      type: object
      properties:
        addProductIds:
          type: array
          items:
            type: integer
          example: [2, 3]
          description: List of product IDs to add to the cart.
        removeProductIds:
          type: array
          items:
            type: integer
          example: [1]
          description: List of product IDs to remove from the cart.


    # ⚠️ ERRORS
    ValidationErrorDto:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Field 'price' must be greater than 0."
        path:
          type: string
          example: "/api/v1/products"

    ErrorResponseDto:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: "Not Found"
        message:
          type: string
          example: "Category with ID 15 not found."
        path:
          type: string
          example: "/api/v1/products"

spring:
  profiles:
    active: local
  application:
    name: AxolotlikCosmoCats

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /api-specs/market-api-spec.yml
    disable-swagger-default-url: true
  api-docs:
    enabled: true

application:
  feature:
    galactic-citizen-registry: true
    deep-space-marketplace: false

---
spring:
  config:
    activate:
      on-profile: dev
application:
  feature:
    galactic-citizen-registry: false

spring:
  profiles:
    active: local
  application:
    name: AxolotlikCosmoCats
  datasource:
    url: jdbc:postgresql://localhost:5432/cosmocats_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /api-specs/market-api-spec.yml
    disable-swagger-default-url: true
  api-docs:
    enabled: true

application:
  feature:
    galactic-citizen-registry: true
    deep-space-marketplace: false

---
spring:
  config:
    activate:
      on-profile: dev
application:
  feature:
    galactic-citizen-registry: false
